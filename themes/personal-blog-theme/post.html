<!DOCTYPE html>
<html class="scroll-smooth">
    {% import "macros.html" as macros %}
    {{ macros.head(this.title) }}
    <body class="bg-neutral-50 dark:bg-neutral-950 text-neutral-800 dark:text-neutral-200 antialiased tracking-tight selection:bg-brand/30">
        {{ macros.navigation(content.pages) }}
        <main class="max-w-3xl mx-auto px-4 md:px-6 pt-10 md:pt-14">
            <header class="mb-10">
                <h1 class="text-3xl md:text-4xl font-bold leading-tight text-neutral-900 dark:text-neutral-100">{{ this.title }}</h1>
                <p class="mt-3 text-sm text-neutral-500 dark:text-neutral-400">Published {{ this.date.strftime('%Y-%m-%d') }}</p>
            </header>
            <article class="post-body prose prose-neutral dark:prose-invert max-w-none">
                {{ this.content }}
            </article>
            <div class="mt-12 flex items-center justify-between border-t border-neutral-200 dark:border-neutral-800 pt-6 text-sm">
                <a href="/" class="text-neutral-500 hover:text-brand dark:text-neutral-400">← Back home</a>
                <a href="#" class="text-neutral-500 hover:text-brand dark:text-neutral-400" onclick="window.scrollTo({top:0,behavior:'smooth'});return false;">Top ↑</a>
            </div>
        </main>

        <!-- Floating Back to Top Button -->
        <button id="backToTop" class="hidden fixed bottom-6 right-6 h-12 w-12 rounded-full bg-brand shadow-lg shadow-brand/30 dark:shadow-brand/20 text-white text-xl font-semibold transition-opacity focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand/60 dark:focus:ring-offset-neutral-900" title="Back to top">↑</button>
        <script>
            const backToTopButton = document.getElementById('backToTop');
            window.addEventListener('scroll', () => {
                if (window.scrollY > 500) {
                    backToTopButton.classList.remove('hidden');
                    backToTopButton.classList.add('opacity-100');
                } else {
                    backToTopButton.classList.add('hidden');
                }
            });
            backToTopButton.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
        </script>
        {{ macros.footer() }}
    </body>
</html>
